version: "3.9"

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: oracle
    ports:
      - "1521:1521"

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - oracle-db

  task-service:
    build: ./task-service
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - oracle-db
      - auth-service

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - task-service
